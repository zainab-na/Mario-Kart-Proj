<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>
</head>
<body>

<h1>✅ Payment Successful!</h1>

<p>Completing tournament registration...</p>

<script>

const pending =
JSON.parse(
    sessionStorage.getItem(
        "pendingRegistration"
    )
);

if (pending) {

    fetch(
  "/api/registrations",
  {
    method: "POST",

    headers: {
      "Content-Type": "application/json",

      "Authorization":
      "Bearer " +
      localStorage.getItem("mk_token")
    },

    body: JSON.stringify(pending)
  }
)
.then(async (res) => {

  if (!res.ok) {
    const err = await res.text();
    console.error(err);
    alert("Registration save failed.");
    return;
  }

  sessionStorage.removeItem(
    "pendingRegistration"
  );

  window.location.href =
  "tournament.html";

})
.catch(err => {
  console.error(err);
  alert("Registration save failed.");
});

}

</script>

</body>
</html>
