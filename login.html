<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Mariokart Tournament</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
    <script src="js/common.js" defer></script>
    <script src="js/login.js" defer></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="section-sub">🏎️ Log In to Race</p>
            <div class="global-success" id="globalSuccess" style="display:none;"></div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="identifier">Username / Email</label>
                    <input type="text" id="identifier" placeholder="admin or you@example.com">
                    <span class="error-msg" id="identifierErr"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="pw-wrapper">
                        <input type="password" id="password" placeholder="Enter your password">
                        <span class="eye-toggle" id="eyeToggle" onclick="togglePw()">🙈</span>
                    </div>
                    <span class="error-msg" id="passwordErr"></span>
                </div>
                <button type="submit" class="submit-btn">🏁 Log In</button>
                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer">
        🏁 Mariokart Tournament &copy; 2025 &nbsp;|&nbsp; May the best racer win!
    </footer>
</body>
</html>
